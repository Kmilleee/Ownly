<!DOCTYPE html>
<html data-th-replace="~{fragment/layout :: frag_layout(content= ~{::main})}" lang="fr">

<body>
<main>
    <div th:if="${error}"
         class="flex max-w-72 items-center p-4 text-sm text-red-100 bg-red-500/20 border border-red-500 rounded-xl backdrop-blur-sm">
        <div>
            <span class="font-bold">Erreur :</span> <span th:text="${error}"></span>
        </div>
    </div>
    <div class="absolute top-0 left-0 w-full h-[120vh] overflow-hidden -z-10 pointer-events-none">

        <div class="absolute top-1/2 right-0 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(126, 34, 206, 0.4) 0%, rgba(0,0,0,0) 70%);
                    transform: translate(30%, -30%);">
        </div>

        <div class="absolute top-1/2 right-0 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(238, 27, 136, 0.66) 0%, rgba(0,0,0,0) 70%);
                    transform: translate(30%, -30%);">
        </div>

        <div class="absolute top-1/2 left-1/2 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(30, 237, 251, 0.46) 0%, rgba(0,0,0,0) 50%);
                    transform: translate(-90%, -60%);">
        </div>

    </div>
    <section class="relative z-10 w-full">

        <div class="flex w-full px-15  gap-10">

            <div class="flex flex-col justify-between w-full gap-8">

                <section>
                    <div class="flex items-center w-full ">
                        <img th:src="@{|/img/avatars/${UserCo.avatar != null ? UserCo.avatar : 'default.png'}|}"
                             alt="Photo de profil"
                             class="rounded-full w-32 h-32 object-cover border-4 border-pink-800"/>
                        <div class="w-full">
                            <div class="flex justify-between">
                                <h1 th:text="${UserCo.username}" class="text-[4rem]"></h1>
                                <div class="flex">
                                    <h1 th:text="${UserCo.credit}" class="text-[4rem]"></h1>
                                    <h1 class="text-[4rem]">$</h1>
                                </div>
                            </div>
                            <div class="flex justify-between ">
                                <div class="flex gap-3">
                                    <h3 th:text="${UserCo.firstName}"></h3>
                                    <h3 th:text="${UserCo.lastName}"></h3>
                                </div>
                                <div>
                                    <a th:href="@{/changeProfile}">
                                        <button class=" bg-white text-black font-bold py-1.5 px-4 rounded-full hover:bg-gray-200 transition">
                                            Change profile
                                        </button>
                                    </a>
                                    <a th:href="@{/creditReward}">
                                        <button th:classappend="${isRewardAvailable} ? 'border-red-500 animate-pulse' : 'border-gray-200'"
                                                class="border-2 bg-white text-black font-bold py-1.5 px-4 rounded-full hover:bg-gray-200 transition">
                                            +
                                        </button>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section>
                    <a th:href="@{/collection}">
                        <button class="border-2 bg-white text-black font-bold py-1.5 px-4 rounded-full hover:bg-gray-200 transition">
                            See collection
                        </button>
                    </a>
                </section>

                <div class="flex w-full justify-between gap-10">
                    <section class="mt-15 w-full">
                        <h1>My Account</h1>
                        <div class="border-1 border-white rounded-3xl p-5">
                            <div class="flex gap-10">
                                <div class="w-full">
                                    <label class="mb-1">
                                        Last Name
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.lastName}"></h2>
                                </div>
                                <div class="w-full">
                                    <label class="mb-1">
                                        First Name
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.firstName}"></h2>
                                </div>
                                <div class="w-full">
                                    <label>
                                        Username
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.username}"></h2>
                                </div>

                            </div>
                            <div class="flex gap-10 mt-5">
                                <div class="w-full">
                                    <label class="mb-1">
                                        City
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.city}"></h2>
                                </div>
                                <div class="w-full">
                                    <label class="mb-1">
                                        Street
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.street}"></h2>
                                </div>
                                <div class="w-full">
                                    <label>
                                        Postal Code
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.postalCode}"></h2>
                                </div>

                            </div>
                            <div class="flex gap-10 mt-5">
                                <div class="w-full">
                                    <label class="mb-1">
                                        Phone
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.numPhone}"></h2>
                                </div>
                                <div class="w-full">
                                    <label class="mb-1">
                                        email
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.email}"></h2>
                                </div>


                            </div>
                        </div>
                    </section>
                    <section class="mt-15 w-full">
                        <h1>Achat</h1>
                        <div class="border-1 border-white rounded-3xl p-5">
                            <div>
                                <label class="mb-1">
                                    Last Name
                                </label>
                                <h2 class="bg-white rounded-xl text-black p-1 w-1/6  text-center"
                                    th:text="${UserCo.lastName}"></h2>
                            </div>
                        </div>
                    </section>
                </div>

                <section class="mt-15 w-full mb-10">
                    <h1>Sell</h1>
                    <div class="border-1 border-white rounded-3xl p-5 grid grid-cols-4 gap-4 ">
                        <div th:each="vente : ${mesVentes}" class="flex flex-col items-center text-center">
                            <p th:text="${vente.articleName}"></p>
                            <img th:src="@{/images/{id}/{name}(id=${vente.id}, name=${vente.image})}"
                                 alt="Image de l'article"
                                 class="w-20 h-20 object-cover rounded">
                            <!--                            <p th:text="${vente.description}"></p>-->
                            <p th:text="${vente.auctionStartDate}"></p>
                            <p th:text="${vente.auctionEndDate}"></p>
                            <p th:text="${vente.startingPrice}"></p>
                            <a th:href="@{/ventes/edit-sale(id=${vente.id})}">
                                <button class=" bg-white text-black font-bold py-1.5 px-4 rounded-full hover:bg-gray-200 transition">
                                    Edit sale
                                </button>
                            </a>
                            <form th:action="@{/ventes/delete-sale(id=${vente.id})}" method="post">
                                <input type="hidden" name="_method" value="delete"/>

                                <button type="submit" class="text-red-500" onsubmit="return confirm('Supprimer ?')">
                                    Supprimer l'article
                                </button>
                            </form>
                        </div>
                    </div>
                </section>

                <section class="mt-15 w-full mb-10">
                    <h1>Auction</h1>
                    <div class="border-1 border-white rounded-3xl p-5 grid grid-cols-4 gap-4 ">
                        <div th:each="achat : ${mesAchats}" class="flex flex-col items-center text-center">
                            <p th:text="${achat.getArticleName()}"></p>
                            <img th:src="@{/images/{id}/{name}(id=${achat.id}, name=${achat.image})}"
                                 alt="Image de l'article"
                                 class="w-20 h-20 object-cover rounded">
                            <p th:text="${achat.description}"></p>
                            <p th:text="${achat.auctionStartDate}"></p>
                            <p th:text="${achat.auctionEndDate}"></p>
                            <p th:text="${achat.startingPrice}"></p>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </section>
</main>
</body>
</html>
