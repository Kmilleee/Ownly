<!DOCTYPE html>
<html data-th-replace="~{fragment/layout :: frag_layout(content= ~{::main})}" lang="fr">

<body>
<main>
    <div class="absolute top-0 left-0 w-full h-[120vh] overflow-hidden -z-10 pointer-events-none">

        <div class="absolute top-1/2 right-0 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(126, 34, 206, 0.4) 0%, rgba(0,0,0,0) 70%);
                    transform: translate(30%, -30%);">
        </div>

        <div class="absolute top-1/2 right-0 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(238, 27, 136, 0.66) 0%, rgba(0,0,0,0) 70%);
                    transform: translate(30%, -30%);">
        </div>

        <div class="absolute top-1/2 left-1/2 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(30, 237, 251, 0.46) 0%, rgba(0,0,0,0) 50%);
                    transform: translate(-90%, -60%);">
        </div>

    </div>
    <section class="relative z-10 w-full">

        <div class="flex w-full px-15  gap-10">

            <div class="flex flex-col justify-between w-full gap-8">

                <section>
                    <div class="flex items-center w-full ">
                        <img th:src="@{|/img/avatars/${UserCo.avatar != null ? UserCo.avatar : 'default.png'}|}"
                             alt="Photo de profil"
                             class="rounded-full w-32 h-32 object-cover border-4 border-pink-800"/>
                        <div class="w-full">
                            <div class="flex justify-between">
                                <h1 th:text="${UserCo.username}" class="text-[4rem]"></h1>
                                <div class="flex">
                                    <h1 th:text="${UserCo.credit}" class="text-[4rem]"></h1>
                                    <h1 class="text-[4rem]">$</h1>
                                </div>
                            </div>
                            <div class="flex justify-between ">
                                <div class="flex gap-3">
                                    <h3 th:text="${UserCo.firstName}"></h3>
                                    <h3 th:text="${UserCo.lastName}"></h3>
                                </div>
                                <div>
                                    <a th:href="@{/changeProfile}">
                                        <button class=" bg-white text-black font-bold py-1.5 px-4 rounded-full hover:bg-gray-200 transition">
                                            Change profile
                                        </button>
                                    </a>
                                    <a th:href="@{/creditReward}">
                                        <button th:classappend="${isRewardAvailable} ? 'border-red-500 animate-pulse' : 'border-gray-200'"
                                                class="border-2 bg-white text-black font-bold py-1.5 px-4 rounded-full hover:bg-gray-200 transition">
                                            +
                                        </button>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section>
                    <a th:href="@{/collection}">
                        <button class="border-2 bg-white text-black font-bold py-1.5 px-4 rounded-full hover:bg-gray-200 transition">
                            See collection
                        </button>
                    </a>
                </section>

                <div class="flex w-full  gap-10">
                    <section class="mt-15 w-full">
                        <h1>My Account</h1>
                        <div class="border-1 border-white rounded-3xl p-5">
                            <div class="flex gap-10">
                                <div class="w-full">
                                    <label class="mb-1">
                                        Last Name
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.lastName}"></h2>
                                </div>
                                <div class="w-full">
                                    <label class="mb-1">
                                        First Name
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.firstName}"></h2>
                                </div>
                                <div class="w-full">
                                    <label>
                                        Username
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.username}"></h2>
                                </div>

                            </div>
                            <div class="flex gap-10 mt-5">
                                <div class="w-full">
                                    <label class="mb-1">
                                        City
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.city}"></h2>
                                </div>
                                <div class="w-full">
                                    <label class="mb-1">
                                        Street
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.street}"></h2>
                                </div>
                                <div class="w-full">
                                    <label>
                                        Postal Code
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.postalCode}"></h2>
                                </div>

                            </div>
                            <div class="flex gap-10 mt-5">
                                <div class="w-full">
                                    <label class="mb-1">
                                        Phone
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.numPhone}"></h2>
                                </div>
                                <div class="w-full">
                                    <label class="mb-1">
                                        email
                                    </label>
                                    <h2 class="bg-white rounded-3xl text-black p-1 w-full  text-center"
                                        th:text="${UserCo.email}"></h2>
                                </div>


                            </div>
                        </div>
                    </section>
                </div>

                <section class="mt-15 w-full mb-10 px-5">
                    <h1 class="text-3xl font-bold mb-6">My Sell</h1>
                    <div class="border border-white rounded-3xl">
                    <div class="p-5 grid grid-cols-1 md:grid-cols-2  gap-8 bg-black/20">

                        <div class="border-r border-gray-600 pr-4">
                            <h2 class="text-xl font-bold mb-4 text-green-400 animate-pulse"> In Progress</h2>

                            <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                <th:block th:each="vente : ${mesVentes}">
                                    <div th:if="${vente.status.name() == 'IN_PROGRESS'}"
                                         class="flex flex-col items-center text-center  p-4  ">

                                        <p class="font-bold text-lg" th:text="${vente.articleName}"></p>

                                        <img th:if="${vente.image != null}"
                                             th:src="|/itemsSold-photos/${vente.id}/${vente.image}|"
                                             alt="Image de l'article"
                                             class="w-24 h-24 object-cover my-2 ">

                                        <div class="text-sm text-gray-400 mb-3">
                                            <p>End : <span th:text="${#temporals.format(vente.auctionEndDate, 'dd/MM HH:mm')}"></span></p>
                                            <p>Actual Price : <span class="text-white font-bold" th:text="${vente.priceSale > 0 ? vente.priceSale : vente.startingPrice} + ' €'"></span></p>
                                        </div>

                                        <div class="flex gap-2">
                                            <a th:href="@{/ventes/edit-sale(id=${vente.id})}">
                                                <button class="bg-white text-black text-sm font-bold py-1 px-3 rounded-full hover:bg-gray-200 transition">
                                                    Change
                                                </button>
                                            </a>

                                            <form th:action="@{/ventes/delete-sale}" method="post"
                                                  onsubmit="return confirm('Voulez-vous vraiment supprimer cette vente ?')">
                                                <input type="hidden" name="id" th:value="${vente.id}"/>
                                                <button type="submit" class="text-red-500 text-sm hover:underline">
                                                    Delete
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </th:block>

<!--                                //le point est rouge mais le code fonctionne bien-->
                                <div th:if="${#lists.isEmpty(mesVentes.?[status.name() == 'IN_PROGRESS'])}" class="text-white italic">
                                    No sale in progress
                                </div>
                            </div>
                        </div>

                        <div class="pl-4">
                            <h2 class="text-xl font-bold mb-4 text-white "> Close</h2>

                            <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                <th:block th:each="vente : ${mesVentes}">
                                    <div th:if="${vente.status.name() == 'COMPLETED'}"
                                         class="flex flex-col items-center text-center  p-4  opacity-75 grayscale hover:grayscale-0 transition duration-300">

                                        <p class="font-bold text-lg text-gray-300" th:text="${vente.articleName}"></p>

                                        <img th:if="${vente.image != null}"
                                             th:src="|/itemsSold-photos/${vente.id}/${vente.image}|"
                                             alt="Image"
                                             class="w-24 h-24 object-cover  my-2 opacity-50">

                                        <div class="text-sm text-gray-500 mb-3">
                                            <p>End : <span th:text="${#temporals.format(vente.auctionEndDate, 'dd/MM/yyyy')}"></span></p>
                                            <p>Final Price : <span class="text-white font-bold" th:text="${vente.priceSale} + ' €'"></span></p>
                                        </div>

                                        <span class="text-xs font-bold border px-2 py-1  text-white">
                                             Sell close
                                        </span>
                                    </div>
                                </th:block>
                            </div>
                        </div>
                    </div>



                    <div class="border-t border-gray-600 pt-4 p-5">
                        <h2 class="text-xl font-bold mb-4 text-white"> Not started</h2>

                        <div class="grid grid-cols-1 xl:grid-cols-4 gap-4">
                            <th:block th:each="vente : ${mesVentes}">
                                <div th:if="${vente.status.name() == 'NOT_STARTED'}"
                                     class="flex flex-col items-center text-center  p-4  ">

                                    <p class="font-bold text-lg" th:text="${vente.articleName}"></p>

                                    <img th:if="${vente.image != null}"
                                         th:src="|/itemsSold-photos/${vente.id}/${vente.image}|"
                                         alt="Image de l'article"
                                         class="w-24 h-24 object-cover my-2 ">

                                    <div class="text-sm text-gray-400 mb-3">
                                        <p>End : <span th:text="${#temporals.format(vente.auctionEndDate, 'dd/MM HH:mm')}"></span></p>
                                        <p>Actual Price : <span class="text-white font-bold" th:text="${vente.priceSale > 0 ? vente.priceSale : vente.startingPrice} + ' €'"></span></p>
                                    </div>

                                    <div class="flex gap-2">
                                        <a th:href="@{/ventes/edit-sale(id=${vente.id})}">
                                            <button class="bg-white text-black text-sm font-bold py-1 px-3 rounded-full hover:bg-gray-200 transition">
                                                Change
                                            </button>
                                        </a>

                                        <form th:action="@{/ventes/delete-sale}" method="post"
                                              onsubmit="return confirm('Voulez-vous vraiment supprimer cette vente ?')">
                                            <input type="hidden" name="id" th:value="${vente.id}"/>
                                            <button type="submit" class="text-red-500 text-sm hover:underline">
                                                Delete
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </th:block>

                            <div th:if="${#lists.isEmpty(mesVentes.?[status.name() == 'NOT_STARTED'])}" class="text-white italic">
                                No pre Sale
                            </div>
                        </div>
                    </div>
                    </div>
                </section>

                <section class="mt-15 w-full mb-10 px-5">
                    <h1 class="text-3xl font-bold mb-6">Auction</h1>
                    <div class="border border-white rounded-3xl">
                        <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-8 bg-black/20">

                            <div class="border-r border-gray-600 pr-4">
                                <h2 class="text-xl font-bold mb-4 text-green-400 animate-pulse"> In Progress</h2>

                                <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                    <th:block th:each="achat : ${mesAchatsEnCours}">
                                        <div th:if="${achat.status.name() == 'IN_PROGRESS'}"
                                             class="flex flex-col items-center text-center  p-4  ">

                                            <p class="font-bold text-lg" th:text="${achat.articleName}"></p>

                                            <img th:src="|/itemsSold-photos/${achat.id}/${achat.image}|"
                                                 alt="Image de l'article"
                                                 class="w-24 h-24 object-cover my-2 ">

                                            <div class="text-sm text-gray-400 mb-3">
                                                <p>End : <span th:text="${#temporals.format(achat.auctionEndDate, 'dd/MM HH:mm')}"></span></p>
                                                <p>Actual Price : <span class="text-white font-bold" th:text="${achat.priceSale > 0 ? achat.priceSale : achat.startingPrice} + ' €'"></span></p>
                                            </div>

                                            <div class="flex gap-2">
                                                <a th:href="@{/auctionDetail(id=${achat.id})}">
                                                    <button class="bg-white text-black text-sm font-bold py-1 px-3 rounded-full hover:bg-gray-200 transition">
                                                        See auction
                                                    </button>
                                                </a>
                                            </div>
                                        </div>
                                    </th:block>

                                    <!--                                //le point est rouge mais le code fonctionne bien-->
                                    <div th:if="${#lists.isEmpty(mesAchatsEnCours.?[status.name() == 'IN_PROGRESS'])}" class="text-white italic">
                                        No auction in progress
                                    </div>
                                </div>
                            </div>

                            <div class="pl-4">
                                <h2 class="text-xl font-bold mb-4 text-white "> Auction Win</h2>

                                <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                                    <th:block th:each="achat : ${mesAchats}">
                                        <div th:if="${achat.status.name() == 'COMPLETED'}"
                                             class="flex flex-col items-center text-center  p-4  opacity-75 grayscale hover:grayscale-0 transition duration-300">

                                            <p class="font-bold text-lg text-gray-300" th:text="${achat.articleName}"></p>

                                            <img th:src="|/itemsSold-photos/${achat.id}/${achat.image}|"
                                                 alt="Image"
                                                 class="w-24 h-24 object-cover  my-2 opacity-50">

                                            <div class="text-sm text-gray-500 mb-3">
                                                <p>End : <span th:text="${#temporals.format(achat.auctionEndDate, 'dd/MM/yyyy')}"></span></p>
                                                <p>Final Price : <span class="text-white font-bold" th:text="${achat.priceSale} + ' €'"></span></p>
                                            </div>

                                            <div th:if="${#lists.isEmpty(mesAchats.?[status.name() == 'COMPLETED'])}" class="text-white italic">
                                                No auction Win
                                            </div>
                                        </div>
                                    </th:block>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </section>
</main>
</body>
</html>
