<!DOCTYPE html>
<html data-th-replace="~{fragment/layout :: frag_layout(content= ~{::main})}" lang="fr">

<body>
<main>
    <div class="absolute top-0 left-0 w-full h-[120vh] overflow-hidden -z-10 pointer-events-none">

        <div class="absolute top-1/2 right-0 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(126, 34, 206, 0.4) 0%, rgba(0,0,0,0) 70%);
                    transform: translate(30%, -30%);">
        </div>

        <div class="absolute top-1/2 right-0 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(238, 27, 136, 0.66) 0%, rgba(0,0,0,0) 70%);
                    transform: translate(30%, -30%);">
        </div>

        <div class="absolute top-1/2 left-1/2 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(30, 237, 251, 0.46) 0%, rgba(0,0,0,0) 50%);
                    transform: translate(-90%, -60%);">
        </div>

    </div>
    <div th:if="${error}" class="alert alert-danger" role="alert">
        <span th:text="${error}">Message d'erreur</span>
    </div>

    <div th:if="${success}" class="alert alert-success" role="alert">
        <span th:text="${success}">Message de succès</span>
    </div>

    <div class="relative z-10">
        <h1 class="text-[5rem] font-bold p-1 ms-15">Auction Détails</h1>
        <section th:if="${itemOBJ.status.name() == 'COMPLETED'}" class="text-center">
            <div class="flex gap-5 flex-col flex" th:if="${gagnant != null}">
                <h3 class="text-xl font-bold text-white uppercase ">Winner</h3>
                <h3 class="text-yellow-600 text-4xl " th:text="${gagnant.getBidder().getUsername()}"></h3>
                <p class="text-lg font-medium text-white ">
                    Remporté pour <span class="font-bold text-white" th:text="${gagnant.auctionAmount} + ' €'">500 €</span>
                </p>
            </div>
            <div class="flex text-xl font-bold text-black uppercase" th:if="${gagnant == null}">
                <h3>No Winner, No auction </h3>
            </div>
        </section>

        <div class="flex justify-between items-center p-5 ms-15 me-15">



            <a th:href="@{/auctionAll}"
               class="group flex items-center gap-2 text-lg font-medium text-white hover:text-gray-400 transition-colors">

                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                     stroke="currentColor"
                     class="w-6 h-6 transition-transform group-hover:-translate-x-1">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
                </svg>

                <span>Back</span>
            </a>

            <h3 class="flex items-center gap-2 text-xl font-bold uppercase tracking-wider">

                <svg viewBox="0 0 8 8" class="w-3 h-3 fill-current"
                     th:classappend="${itemOBJ.status.name() == 'IN_PROGRESS' ? 'text-green-500 animate-ping transition' :
                         (itemOBJ.status.name() == 'COMPLETED' ? 'text-red-500 animate-ping transition' : ' text-yellow-500 animate-ping transition ')}">
                    <circle cx="4" cy="4" r="3"/>
                </svg>

                <span th:text="${itemOBJ.status}">STATUS</span>
            </h3>
        </div>
    </div>


    <section class="flex w-full justify-between items-start gap-10 px-10 py-5">

        <div class="flex gap-8 w-2/3">

            <div class="shrink-0">
                <img th:src="|/itemsSold-photos/${itemOBJ.id}/${itemOBJ.image}|"
                     alt="image de l'item à vendre"
                     class="w-[600px] h-[600px] object-cover">
            </div>

            <div class="flex flex-col w-full leading-none space-y-2 justify-center ">

                <div class="flex items-center gap-4 text-white font-medium">
                    <h2 class="text-3xl" th:text="${itemOBJ.getCategory().name}"></h2>
                    <span class="text-2xl">•</span>
                    <h2 class="text-3xl uppercase tracking-widest"
                        th:classappend="${itemOBJ.rarity.name() == 'LEGENDARY' ? 'text-yellow-500' :
                     (itemOBJ.rarity.name() == 'EPIC'      ? 'text-purple-600' :
                     (itemOBJ.rarity.name() == 'RARE'      ? 'text-blue-500'   : 'text-gray-600'))}"
                        th:text="${itemOBJ.rarity.name()}">
                    </h2>
                </div>

                <h1 class="text-6xl font-black tracking-tight text-white" th:text="${itemOBJ.articleName}"></h1>

                <div class="flex items-center gap-6 mt-4">
                    <h3 class="text-4xl font-bold text-white" th:text="${itemOBJ.startingPrice} + ' €'"></h3>
                    <div class="flex items-center gap-2 text-xl text-gray-600 bg-gray-100 px-3 py-1 rounded-full">
                        <span class="text-black">Vendeur :</span>
                        <h3 class="font-semibold text-black" th:text="${itemOBJ.seller.username}"></h3>
                    </div>
                </div>
                <div class="flex ">
                    <h4 class="text-lg text-white leading-relaxed mt-6 text-justify pr-10"
                        th:text="${itemOBJ.getWithdrawal().city}">
                    </h4>
                    <h4 class="text-lg text-white leading-relaxed mt-6 text-justify pr-10"
                        th:text="${itemOBJ.getWithdrawal().street}">
                    </h4>
                    <h4 class="text-lg text-white leading-relaxed mt-6 text-justify pr-10"
                        th:text="${itemOBJ.getWithdrawal().postalCode}">
                    </h4>
                </div>
                <div class="flex ">
                    <h4 class="text-lg text-white leading-relaxed mt-6 text-justify pr-10"
                        th:text="${itemOBJ.auctionStartDate}">
                    </h4>
                    <h4 class="text-lg text-white leading-relaxed mt-6 text-justify pr-10">
                        -
                    </h4>
                    <h4 class="text-lg text-white leading-relaxed mt-6 text-justify pr-10"
                        th:text="${itemOBJ.auctionEndDate}">
                    </h4>
                </div>
            </div>
        </div>


        <div class="w-1/3  bg-gray-50 rounded-2xl p-8 border border-gray-200  top-10 overflow-auto">
            <h1 class="text-3xl text-black font-bold mb-6 border-b border-gray-300 pb-4">Auction :</h1>

            <div class="flex flex-col gap-3 max-h-[500px] overflow-y-auto pr-2">

                <div th:if="${listAuction.isEmpty()}" class="text-gray-400 italic text-center py-10">
                    Aucune offre pour le moment.<br>Soyez le premier !
                </div>

                <div th:each="a : ${listAuction}"
                     class="flex justify-between items-center ">
                    <div class="flex items-center gap-3">
                        <span class="font-semibold text-gray-700" th:text="${a.getBidder().getUsername()}"></span>
                    </div>
                    <h3 class="text-xl font-bold text-black" th:text="${a.auctionAmount} + ' €'"></h3>
                </div>

            </div>
        </div>


    </section>

    <section class="flex w-full justify-between items-start gap-10 px-10 py-5 ">
        <h4 class="text-lg text-white leading-relaxed mt-6 text-justify pr-10"
            th:text="${itemOBJ.description}">
            Description...
        </h4>
    </section>


    <div class="flex flex-col items-center gap-6 w-full max-w-sm mx-auto p-4">

        <form th:action="@{/encherir}" method="post" class="w-full flex flex-col items-center gap-4">

            <input type="hidden" name="articleId" th:value="${itemOBJ.id}"/>

            <div class="w-full">
                <label for="montant"
                       class="block mb-2 text-sm font-bold text-white text-center uppercase tracking-wide">
                    Enchérir
                </label>

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="text-black font-bold">€</span>
                    </div>

                    <input type="number"
                           id="montant"
                           name="montant"
                           th:min="${itemOBJ.priceSale + 1}"
                           required
                           placeholder="Price"
                           th:disabled="${itemOBJ.status.name() != 'IN_PROGRESS'}"
                           class="block w-full pl-8 pr-4 py-3 border-2 border-gray-200 rounded-xl text-black placeholder-black focus:outline-none focus:border-black focus:ring-0 transition-colors bg-gray-50 text-lg font-medium disabled:bg-gray-200 disabled:cursor-not-allowed"/>
                </div>
            </div>

            <button type="submit"
                    th:disabled="${itemOBJ.status.name() != 'IN_PROGRESS'}"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-full text-white bg-black  focus:ring-2 focus:ring-offset-2 focus:ring-gray-900 shadow-lg transform transition hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:bg-gray-400">

            <span class="flex items-center gap-2">
                ENCHÉRIR
            </span>
            </button>

        </form>
    </div>
