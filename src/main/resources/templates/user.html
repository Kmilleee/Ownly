    <!-- Table responsive wrapper -->
    <div class="overflow-x-auto bg-grey dark:bg-neutral-700 max-h-full overflow-y-scroll">

        <!-- Search input -->
        <div class="relative m-[2px] mb-3 mr-5 float-left">
            <label for="inputSearch" class="sr-only">Search </label>
            <input id="inputSearch" type="text" placeholder="Search..." class="block w-64 rounded-lg border dark:border-none dark:bg-neutral-600 py-2 pl-10 pr-4 text-sm focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-400" />
            <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 transform">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-4 w-4 text-neutral-500 dark:text-neutral-200">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
      </svg>
    </span>
        </div>

        <!-- Filter -->
        <div class="relative m-[2px] mb-3 float-right hidden sm:block">
            <label for="inputFilter" class="sr-only">Filter</label>
            <select id="inputFilter" class="block w-40 rounded-lg border dark:border-none dark:bg-neutral-600 p-2 text-sm focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-400">
                <option value="1" selected>Last week</option>
                <option value="2">Last month</option>
                <option value="3">Yesterday</option>
                <option value="4">Last 7 days</option>
                <option value="5">Last 30 days</option>
            </select>
        </div>

        <!-- Table -->
        <table class="min-w-full text-left text-sm whitespace-nowrap">

            <!-- Table head -->
            <thead class="uppercase tracking-wider sticky top-0 bg-grey dark:bg-neutral-700 outline outline-2 outline-neutral-200 dark:outline-neutral-600">
            <tr>
                <th scope="col" class="px-6 py-3">
                    Username
                </th>
                <th scope="col" class="px-6 py-3">
                    Last Name
                </th>
                <th scope="col" class="px-6 py-3">
                    Frist Name
                </th>
                <th scope="col" class="px-6 py-3">
                    Email
                </th>
                <th scope="col" class="px-6 py-3">
                    Phone
                </th>
                <th scope="col" class="px-6 py-3">
                    Street
                </th>
                <th scope="col" class="px-6 py-3">
                    Postal Code
                </th>
                <th scope="col" class="px-6 py-3">
                    City
                </th>
                <th scope="col" class="px-6 py-3">
                    Password
                </th>
                <th scope="col" class="px-6 py-3">
                    Credit
                </th>
            </tr>
            </thead>

            <!-- Table body -->
            <tbody>

            <tr  th:each="u : ${userList}" class="border-b dark:border-neutral-600">
                <th scope="row" class="px-6 py-3">
                    Handbag
                </th>
                <th class="px-6 py-3" th:text="${u.getUsername()}" ></th>
                <th class="px-6 py-3" th:text="${u.getLastName()}" ></th>
                <th class="px-6 py-3" th:text="${u.getFirstName()}" ></th>
                <th class="px-6 py-3" th:text="${u.getEmail()}" ></th>
                <th class="px-6 py-3" th:text="${u.getNumPhone()}" ></th>
                <th class="px-6 py-3" th:text="${u.getStreet()}" ></th>
                <th class="px-6 py-3" th:text="${u.getPostalCode()}" ></th>
                <th class="px-6 py-3" th:text="${u.getCity()}" ></th>
                <th class="px-6 py-3" th:text="${u.getPassword()}" ></th>
                <th class="px-6 py-3" th:text="${u.getCredit()}" ></th>
            </tr>


            </tbody>

            <tfoot class="border-t-2 dark:border-neutral-600">
            <tr>
                <th class="px-6 py-3">Total:</th>
                <td class="px-6 py-3">$772.43</td>
                <td class="px-6 py-3">150</td>
                <td class="px-6 py-3"></td>
            </tr>
            </tfoot>

        </table>

        <nav class="mt-5 flex items-center justify-between text-sm" aria-label="Page navigation example">
            <p>
                Showing <strong>1-5</strong> of <strong>10</strong>
            </p>

            <ul class="list-style-none flex">
                <li>
                    <a
                            class="relative block rounded bg-transparent px-3 py-1.5 text-sm text-neutral-600 transition-all duration-300 hover:bg-neutral-100 dark:text-white dark:hover:bg-neutral-700 dark:hover:text-white"
                            href="#!"
                    >
                        Previous
                    </a>
                </li>
                <li>
                    <a

                            href="#!"
                    >

                    </a>
                </li>
                <li aria-current="page">
                    <a

                            href="#!"
                    >
                        2
                        <span class="absolute -m-px h-px w-px overflow-hidden whitespace-nowrap border-0 p-0 [clip:rect(0,0,0,0)]">
            (current)
          </span>
                    </a>
                </li>
                <li>
                    <a
                            class="relative block rounded bg-transparent px-3 py-1.5 text-sm text-neutral-600 transition-all duration-300 hover:bg-neutral-100 dark:text-white dark:hover:bg-neutral-700 dark:hover:text-white"
                            href="#!"
                    >
                        3
                    </a>
                </li>
                <li>
                    <a
                            class="relative block rounded bg-transparent px-3 py-1.5 text-sm text-neutral-600 transition-all duration-300 hover:bg-neutral-100 dark:text-white dark:hover:bg-neutral-700 dark:hover:text-white"
                            href="#!"
                    >
                        Next
                    </a>
                </li>
            </ul>
        </nav>

    </div>
