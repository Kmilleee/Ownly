<!DOCTYPE html>
<html data-th-replace="~{fragment/layout :: frag_layout(content= ~{::main})}" lang="fr">

<body>
<main class="mb-30">
    <h2 class="text-[4rem]    md:text-[5rem] ml-9 text-white text-3xl font-semibold  text-start mb-3 tracking-tight mb-10">All Withdrawals</h2>
    <section class=" h-2/3 w-full mb-10">
        <div class="flex justify-center">
            <div class=" overflow-x-auto bg-grey dark:bg-neutral-700 max-h-full overflow-y-auto
          [&::-webkit-scrollbar]:w-2
          [&::-webkit-scrollbar-track]:bg-transparent
          [&::-webkit-scrollbar-thumb]:bg-transparent
          dark:[&::-webkit-scrollbar-track]:bg-neutral-700
          dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
                <div class="relative m-[2px] mb-3 mr-5 float-left">
                    <label for="inputSearch" class="sr-only">Search </label>
                    <input id="inputSearch" type="text" placeholder="Search..."
                           class="block w-64 rounded-lg border dark:border-none dark:bg-neutral-600 py-2 pl-10 pr-4 text-sm focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-400"/>
                    <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 transform">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
           class="h-4 w-4 text-neutral-500 dark:text-neutral-200">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
      </svg>
    </span>
                </div>
                <div class="relative m-[2px] mb-3 float-right hidden sm:block">
                    <label for="inputFilter" class="sr-only">Filter</label>
                    <select id="inputFilter"
                            class="block w-40 rounded-lg border dark:border-none dark:bg-neutral-600 p-2 text-sm focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-400">
                        <option value="1" selected>Last week</option>
                        <option value="2">Last month</option>
                        <option value="3">Yesterday</option>
                        <option value="4">Last 7 days</option>
                        <option value="5">Last 30 days</option>
                    </select>
                </div>
                <table class="min-w-full text-left text-sm whitespace-nowrap">
                    <thead class="uppercase tracking-wider sticky top-0 bg-grey dark:bg-neutral-700 outline outline-2 outline-neutral-200 dark:outline-neutral-600 bg-black">
                    <tr>
                        <th scope="col" class="px-6 py-3">
                            Id
                        </th>
                        <th scope="col" class="px-6 py-3">
                            Street
                        </th>
                        <th scope="col" class="px-6 py-3">
                            Postal Code
                        </th>
                        <th scope="col" class="px-6 py-3">
                            City
                        </th>
                        <th scope="col" class="px-6 py-3">
                            Delete
                        </th>
                        <th scope="col" class="px-6 py-3">
                            Change
                        </th>
                    </tr>
                    </thead>
                    <tbody>

                    <tr th:each="w : ${withdrawalList}" class="border-b dark:border-neutral-600">
                        <th class="px-6 py-3" th:text="${w.article_id}"></th>
                        <th class="px-6 py-3" th:text="${w.street}"></th>
                        <th class="px-6 py-3" th:text="${w.postalCode}"></th>
                        <th class="px-6 py-3" th:text="${w.city}"></th>
                        <th>
                            <form th:action="@{/admin/deleteWithdrawal(id=${w.withdrawal_id})}" method="post">

                                <input type="hidden" name="_method" value="delete"/>

                                <button type="submit" class="btn-danger">Supprimer</button>
                            </form>
                        </th>
                        <th>
                            <button type="button"
                                    th:onclick="'document.getElementById(\'modal-' + ${w.withdrawal_id} + '\').showModal()'">
                                Change
                            </button>
                            <!--MODAL-->
                            <dialog th:id="'modal-' + ${w.withdrawal_id}">
                                <h3>Change Withdrawal</h3>

                                <form th:action="@{/admin/updateWithdrawal}" method="post">

                                    <input type="hidden" name="withdrawal_id" th:value="${w.withdrawal_id}"/>

                                    <ul>
                                        <li>
                                            <label>Postal Code :</label>
                                            <input type="text" name="postalCode" th:value="${w.postalCode}" required/>
                                        </li>
                                        <li>
                                            <label>Street :</label>
                                            <input type="text" name="Street" th:value="${w.street}" required/>
                                        </li>
                                        <li>
                                            <label>City :</label>
                                            <input type="text" name="city" th:value="${w.city}" required/>
                                        </li>
                                        <li>
                                            <label>id :</label>
                                            <input type="text" name="article_id" th:value="${w.article_id}" required/>
                                        </li>
                                    </ul>

                                    <button type="submit">Save</button>

                                    <button type="button" onclick="this.closest('dialog').close()">Back</button>
                                </form>
                            </dialog>
                        </th>
                    </tr>
                    </tbody>
                    <tfoot class="border-t-2 dark:border-neutral-600">
                    <tr>
                        <th class="px-6 py-3">Total withdrawal:</th>
                        <td class="px-6 py-3" th:text="${withdrawalList.size()}"></td>
                    </tr>
                    </tfoot>
                </table>

            </div>
        </div>
    </section>
</main>
</body>
</html>
