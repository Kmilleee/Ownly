<main class="container mx-auto p-10 text-white">
    <h1 class="text-4xl font-chillax mb-10 text-center">Choisis ton Avatar</h1>

    <form th:action="@{/changeProfile/edit-avatar}" method="post" class="max-w-4xl mx-auto">

        <div class="grid grid-cols-2 md:grid-cols-4 gap-8">

            <div th:each="avatar : ${avatarList}" class="relative">

                <input type="radio"
                       name="avatarChoice"
                       th:id="'radio-' + ${avatar}"
                       th:value="${avatar}"
                       class="peer hidden"
                       required />

                <label th:for="'radio-' + ${avatar}"
                       class="block cursor-pointer rounded-full overflow-hidden border-4 border-transparent
                              hover:border-gray-500 transition-all duration-200
                              peer-checked:border-purple-500 peer-checked:scale-110 peer-checked:shadow-[0_0_20px_rgba(168,85,247,0.5)]">

                    <img th:src="@{|/img/avatars/${avatar}|}"
                         alt="Avatar"
                         class="w-full h-auto object-cover bg-gray-800" />
                </label>

                <div class="absolute top-0 right-0 hidden peer-checked:block">
                    <div class="bg-purple-500 rounded-full p-1 shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                        </svg>
                    </div>
                </div>

            </div>
        </div>

        <div class="mt-12 text-center">
            <button type="submit"
                    class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-8 rounded-full transition-all transform hover:-translate-y-1 shadow-lg">
                Sauvegarder mon profil
            </button>
        </div>

    </form>
</main>
