<!DOCTYPE html>
<html data-th-replace="~{fragment/layout :: frag_layout(content= ~{::main})}" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<main><h1>Page test </h1>
    <form th:action="@{/ventes/createSale}" method="POST" th:object="${article}">

        <div id="infos">
            <div class="form-group">
                <label for="name">Name :</label>
                <input id="name" type="text" th:field="*{articleName}">
            </div>

            <div class="form-group">
                <label for="category">Category :</label>
                <select id="category" th:field="*{category.idCategory}">
                    <option th:each="item : ${categoryList}"
                            th:text="${item.name}"
                            th:value="${item.idCategory}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="price">Price :</label>
                <input id="price" type="number" th:field="*{startingPrice}">
            </div>

            <div class="form-group">
                <label for="startDate">Beginning :</label>
                <input id="startDate" type="date" th:field="*{auctionStartDate}">
            </div>

            <div class="form-group">
                <label for="endDate">End :</label>
                <input id="endDate" type="date" th:field="*{auctionEndDate}">
            </div>

            <div class="form-group">
                <label for="description">Description :</label>
                <textarea id="description" th:field="*{description}"></textarea>
            </div>
        </div>

        <div id="withdrawal">
            <h3>Withdrawal</h3>

            <div class="form-group">
                <label for="street">Street :</label>
                <input id="street" type="text" th:field="*{withdrawal.street}">
            </div>

            <div class="form-group">
                <label for="cp">Postal Code :</label>
                <input id="cp" type="text" th:field="*{withdrawal.postalCode}">
            </div>

            <div class="form-group">
                <label for="city">City :</label>
                <input id="city" type="text" th:field="*{withdrawal.city}">
            </div>
        </div>

        <div class="actions">
            <button type="button" id="btn-next">Next</button>

            <button type="submit">Save</button>
            <a href="/">Cancel</a>
        </div>

    </form>

</main>
</body>
</html>
