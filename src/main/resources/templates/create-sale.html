<!DOCTYPE html>
<html data-th-replace="~{fragment/layout :: frag_layout(content= ~{::main})}" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<main>
    <h1 class="text-[1.5rem] md:text-[5rem] ml-9 text-white text-3xl font-semibold  text-start mb-3 tracking-tight">New
        sale</h1>
    <form th:action="@{/ventes/createSale}" method="POST" th:object="${article}" class="max-w-md mx-auto md:hidden">
        <div class='w-full max-w-lg backdrop-blur-sm rounded-xl p-8'>

            <div id="infos">
                <h2 class="text-center text-[1.3rem]">Infos</h2>
                <div>
                    <label class='block text-white text-sm mb-2'>Name</label>
                    <input type="text" required placeholder=" " th:field="*{articleName}"
                           class='w-full bg-white border border-white rounded-lg px-4 py-3 text-black placeholder:text-black placeholder:text-sm focus:outline-none focus:border-stone-50 transition'>
                </div>

                <div>
                    <label class='mt-4 block text-white text-sm mb-2'>Category</label>
                    <select id="category" th:field="*{category.category_id}"
                            class='w-full bg-white border border-white rounded-lg px-4 py-3 text-black placeholder:text-black placeholder:text-sm focus:outline-none focus:border-stone-50 transition'
                            required>
                        <option th:each="item : ${categoryList}" th:text="${item.name}"
                                th:value="${item.category_id}"></option>
                    </select>
                </div>

                <div>
                    <label class='mt-4 block text-white text-sm mb-2'>Price</label>
                    <input type="number" required placeholder=" " th:field="*{startingPrice}"
                           class='w-full bg-white border border-white rounded-lg px-4 py-3 text-black placeholder:text-black placeholder:text-sm focus:outline-none focus:border-stone-50 transition'>
                </div>
                <section class="flex place-content-around gap-2">
                    <div class="w-1/2">
                        <label class='mt-4 block text-white text-sm mb-2'>Start</label>
                        <input type="date" required placeholder=" " th:field="*{auctionStartDate}"
                               class='w-full bg-white border border-white rounded-lg px-4 py-3 text-black placeholder:text-black placeholder:text-sm focus:outline-none focus:border-stone-50 transition'>
                    </div>
                    <div class="w-1/2">
                        <label class='mt-4 block text-white text-sm mb-2'>End</label>
                        <input type="date" required placeholder=" " th:field="*{auctionEndDate}"
                               class='w-full bg-white border border-white rounded-lg px-4 py-3 text-black placeholder:text-black placeholder:text-sm focus:outline-none focus:border-stone-50 transition'>
                    </div>
                </section>

                <div>
                    <label class='mt-4 block text-white text-sm mb-2'>Description</label>
                    <textarea placeholder=" " rows="4" required th:field="*{description}"
                              class='w-full bg-white border border-white rounded-lg px-4 py-3 text-black placeholder:text-black placeholder:text-sm focus:outline-none focus:border-stone-50 transition'></textarea>
                </div>
            </div>
            <div id="withdrawal" class="hidden md:block mt-4">
                <h2 class="text-center text-[1.3rem]">Withdrawal</h2>
                <div>
                    <label class='block text-white text-sm mb-2'>Street</label>
                    <input type="text" placeholder=" " th:field="*{withdrawal.street}"
                           class='w-full bg-white border border-white rounded-lg px-4 py-3 text-black placeholder:text-black placeholder:text-sm focus:outline-none focus:border-stone-50 transition'
                           required>
                </div>
                <div>
                    <label class='block text-white text-sm mb-2'>Postal Code</label>
                    <input type="text" placeholder=" " th:field="*{withdrawal.postalCode}"
                           class='w-full bg-white border border-white rounded-lg px-4 py-3 text-black placeholder:text-black placeholder:text-sm focus:outline-none focus:border-stone-50 transition'
                           required>
                </div>
                <div>
                    <label class='block text-white text-sm mb-2'>City</label>
                    <input type="text" placeholder=" " th:field="*{withdrawal.city}"
                           class='w-full bg-white border border-white rounded-lg px-4 py-3 text-black placeholder:text-black placeholder:text-sm focus:outline-none focus:border-stone-50 transition'
                           required>
                </div>
            </div>
            <div class="actions flex items-center justify-around mt-6">
                <button type="button" id="btn-next"
                        class="md:hidden bg-white hover:from-green-600 hover:to-green-950 text-black text-sm px-8 md:px-16 py-3 rounded-full cursor-pointer"
                        onclick="nextStep()">Next
                </button>

                <button type="submit" id="btn-save"
                        class="hidden md:block bg-white hover:from-green-600 hover:to-green-950 text-black text-sm px-8 md:px-16 py-3 rounded-full cursor-pointer">
                    Save
                </button>

                <a href="/" class="text-white hover:text-gray-300 transition">Cancel</a>
            </div>
        </div>
    </form>
    <script th:src="@{/js/form-steps.js}"></script>


    <section class="flex items-center justify-center py-12 px-4">
        <form class="grid md:grid-cols-2 md:gap-10 lg:gap-20 max-w-7xl w-full items-start"
              th:action="@{/ventes/createSale}" method="POST" th:object="${article}">

            <div class="p-5">
                <h1 class="text-3xl font-semibold text-white text-center md:text-start mb-3 tracking-tight">
                    Your product
                </h1>
                <p class="text-sm/6 text-white text-center md:text-start mx-auto md:mx-0 mb-8 leading-relaxed max-w-[400px]">
                    Have a question or idea? Our approachable team would love to connect and support you.
                </p>

                <div class="grid grid-cols-2 gap-4 mb-5">
                    <div>
                        <label class="block text-sm text-white mb-2" for="articleName">Name</label>
                        <input th:field="*{articleName}" id="articleName" type="text" placeholder="David"
                               class="w-full px-3 py-3 border border-gray-300 rounded-lg text-sm outline-none focus:border-indigo-500 transition-colors"/>
                    </div>
                    <div>
                        <label class="block text-sm text-white-500 mb-2">Category</label>
                        <input type="text" placeholder="Andrew"
                               class="w-full px-3 py-3 border border-gray-300 rounded-lg text-sm outline-none focus:border-indigo-500 transition-colors"/>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="block text-sm text-white mb-2">Email id</label>
                    <input type="email" placeholder="david@company.com"
                           class="w-full px-3 py-3 border border-gray-300 rounded-lg text-sm outline-none focus:border-indigo-500 transition-colors"/>
                </div>

                <div class="mb-5">
                    <label class="block text-sm text-white-500 mb-2">Phone number</label>
                    <div class="flex border border-gray-300 rounded-lg overflow-hidden focus-within:border-indigo-500 transition-colors">
                        <select class="px-3 py-3 text-sm outline-none cursor-pointer text-white bg-transparent border-r border-gray-300">
                            <option class="text-black">US</option>
                            <option class="text-black">UK</option>
                            <option class="text-black">IN</option>
                            <option class="text-black">CA</option>
                        </select>
                        <input type="tel" placeholder="+1 342 123-456" class="flex-1 px-3 py-3 text-sm outline-none"/>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="block text-sm text-white-500 mb-2">Phone number</label>
                    <div class="flex border border-gray-300 rounded-lg overflow-hidden focus-within:border-indigo-500 transition-colors">
                        <input type="tel" placeholder="+1 342 123-456" class="flex-1 px-3 py-3 text-sm outline-none"/>
                    </div>
                </div>

                <div class="flex items-center gap-2 mb-6">
                    <input type="checkbox"
                           class="w-5 h-5 cursor-pointer accent-indigo-500 rounded-[5px] text-gray-300"/>
                    <label class="text-sm text-white cursor-pointer">
                        You agree to our <span class="underline">terms</span> and <span
                            class="underline">privacy policy</span>.
                    </label>
                </div>
            </div>

            <div class="rounded-3xl p-10 relative h-full min-h-[500px] w-full hidden md:flex flex-col justify-between overflow-hidden">
                <img src="/img/figurineTest.png" alt="3D shapes" class="absolute inset-0 w-full h-full object-cover"/>

                <div class="relative z-10 mt-auto">
                    <p class="text-sm/6 text-white mb-5 max-w-[400px]">
                        Stop spending hours recreating layouts - with <strong>PrebuiltUI</strong> you can copy,
                        customize and launch stunning UIs in minutes.
                    </p>
                    <p class="text-sm text-white mb-4 text-right">━ Emily Rodriguez</p>
                    <div class="flex justify-end gap-2 items-center">
                        <div class="w-2.5 h-2.5 rounded-full bg-white"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-white"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-gray-400"></div>
                    </div>
                </div>
            </div>

            <div class="mb-5 md:col-span-2 w-full p-5">
                <label class="block text-sm text-white mb-2">Description</label>
                <textarea rows="4"
                          class="w-full px-3 py-3 border border-gray-300 rounded-lg text-sm outline-none resize-y focus:border-indigo-500 transition-colors"
                          placeholder="Write your message here..."></textarea>

                <div class="border border-white-500 w-full mt-10"></div>
                <h1 class="text-3xl mt-15 font-semibold text-white text-center md:text-start mb-3 tracking-tight">
                    Withdrawal
                </h1>

                <div class="flex-col mt-15">
                    <div class="mb-5 flex items-center w-full justify-around">
                        <label class="block text-sm text-white-500 mb-2">Phone number</label>
                        <div class="w-1/2 flex border border-gray-300 rounded-lg overflow-hidden focus-within:border-indigo-500 transition-colors">
                            <input type="tel" placeholder="+1 342 123-456"
                                   class="flex-1 px-3 py-3 text-sm outline-none"/>
                        </div>
                    </div>
                    <div class="mb-5 flex items-center w-full justify-around">
                        <label class="block text-sm text-white-500 mb-2">Phone number</label>
                        <div class="w-1/2 flex border border-gray-300 rounded-lg overflow-hidden focus-within:border-indigo-500 transition-colors">
                            <input type="tel" placeholder="+1 342 123-456"
                                   class="flex-1 px-3 py-3 text-sm outline-none"/>
                        </div>
                    </div>
                    <div class="mb-5 flex items-center w-full justify-around">
                        <label class="block text-sm text-white-500 mb-2">Phone number</label>
                        <div class="w-1/2 flex border border-gray-300 rounded-lg overflow-hidden focus-within:border-indigo-500 transition-colors">
                            <input type="tel" placeholder="+1 342 123-456"
                                   class="flex-1 px-3 py-3 text-sm outline-none"/>
                        </div>
                    </div>
                    <div class="flex gap-15 mt-15 ">
                        <button type="submit"
                                class="mt-4 w-full py-3.5 bg-gradient-to-br bg-white text-black rounded-lg text-sm cursor-pointer transition-all hover:-translate-y-0.5 hover:shadow-lg font-bold">
                            Apply
                        </button>
                        <button type="submit"
                                class="mt-4 w-full py-3.5 bg-gradient-to-br  bg-white text-black rounded-lg text-sm cursor-pointer transition-all hover:-translate-y-0.5 hover:shadow-lg font-bold">
                            Back
                        </button>
                    </div>

                </div>
            </div>


        </form>
    </section>


</main>
</body>
</html>
