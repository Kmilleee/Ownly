<!DOCTYPE html>
<html data-th-replace="~{fragment/layout :: frag_layout(content= ~{::main})}" lang="fr">

<body>
<main>
    <div class="absolute top-0 left-0 w-full h-[120vh] overflow-hidden -z-10 pointer-events-none">

        <div class="absolute top-1/2 right-0 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(126, 34, 206, 0.4) 0%, rgba(0,0,0,0) 70%);
                    transform: translate(30%, -30%);">
        </div>

        <div class="absolute top-1/2 right-0 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(238, 27, 136, 0.66) 0%, rgba(0,0,0,0) 70%);
                    transform: translate(30%, -30%);">
        </div>

        <div class="absolute top-1/2 left-1/2 w-[400px] h-[400px] md:w-[800px] md:h-[800px]"
             style="background: radial-gradient(circle, rgba(30, 237, 251, 0.46) 0%, rgba(0,0,0,0) 50%);
                    transform: translate(-90%, -60%);">
        </div>

    </div>
    <section class="relative z-10 w-full">
        <h1 class="text-[5rem] font-bold text-white ms-12 mb-10">Admin Center</h1>

        <div class="flex w-full px-15  gap-10">

            <div class="flex flex-col justify-between w-1/2 gap-8">

                <section>
                    <h3 class="text-white text-xl mb-2">User</h3>
                    <div class="border-2 border-white/20 rounded-2xl p-6 bg-black/20 backdrop-blur-sm">
                        <div class="flex justify-between gap-4">
                            <a th:href="@{/user}" class="w-full">
                                <button class="w-full bg-white text-black font-bold py-3 px-4 rounded-full hover:bg-gray-200 transition">
                                    See Users
                                </button>
                            </a>

                            <a th:href="@{/admin/addUser}" class="w-full">
                                <button class="w-full bg-white text-black font-bold py-3 px-4 rounded-full hover:bg-gray-200 transition">
                                    Add Users
                                </button>
                            </a>
                        </div>
                        <div class="mt-4">
                            <a th:href="@{/login}">
                                <button class="w-full border border-white text-white font-bold py-3 px-4 rounded-full hover:bg-white/10 transition">
                                    Delete ALL
                                </button>
                            </a>
                        </div>
                    </div>
                </section>

                <section>
                    <h3 class="text-white text-xl mb-2">Category</h3>
                    <div class="border-2 border-white/20 rounded-2xl p-6 bg-black/20 backdrop-blur-sm">
                        <div class="flex justify-between gap-4">
                            <a th:href="@{/admin/categoryList}" class="w-full">
                                <button class="w-full bg-white text-black font-bold py-3 px-4 rounded-full hover:bg-gray-200 transition">
                                    See Category
                                </button>
                            </a>
                            <a th:href="@{/admin/createCat}" class="w-full">
                                <button class="w-full bg-white text-black font-bold py-3 px-4 rounded-full hover:bg-gray-200 transition">
                                    Add Category
                                </button>
                            </a>
                        </div>
                        <div class="mt-4">
                            <button class="w-full border border-white text-white font-bold py-3 px-4 rounded-full hover:bg-white/10 transition">
                                Delete ALL
                            </button>
                        </div>
                    </div>
                </section>

                <section>
                    <h3 class="text-white text-xl mb-2">Withdrawal</h3>
                    <div class="border-2 border-white/20 rounded-2xl p-6 bg-black/20 backdrop-blur-sm">
                        <div class="flex justify-between gap-4">

                            <a th:href="@{/withdrawal}" class="w-full">
                                <button class="w-full bg-white text-black font-bold py-3 px-4 rounded-full hover:bg-gray-200 transition">
                                    See Withdrawal
                                </button>
                            </a>
                            <a th:href="@{/admin/addWithdrawal}" class="w-full">
                                <button class="w-full bg-white text-black font-bold py-3 px-4 rounded-full hover:bg-gray-200 transition">
                                    Add withdrawal
                                </button>
                            </a>
                        </div>
                        <div class="mt-4">
                            <button class="w-full border border-white text-white font-bold py-3 px-4 rounded-full hover:bg-white/10 transition">
                                Delete ALL
                            </button>
                        </div>
                    </div>
                </section>

            </div>


                <div class="rounded-2xl overflow-hidden flex justify-center w-1/2 items-center">
                <img src="/img/imageAdminn.png" alt="Admin Illustration" class="w-auto max-w-md">
            </div>


        </div>
        <section class="m-15">
            <h3 class="text-white text-xl mb-2">Auction (à faire)</h3>
            <div class="border-2 border-white/20 rounded-2xl p-6 bg-black/20 backdrop-blur-sm">
                <div class="flex justify-between gap-4">
                    <button class="w-full bg-white text-black font-bold py-3 px-4 rounded-full hover:bg-gray-200 transition">
                        See auction
                    </button>
                    <button class="w-full bg-white text-black font-bold py-3 px-4 rounded-full hover:bg-gray-200 transition">
                        Add auction
                    </button>
                </div>
            </div>
        </section>
    </section>
</main>
</body>
</html>
