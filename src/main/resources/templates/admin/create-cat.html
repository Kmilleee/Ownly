<!DOCTYPE html>
<html data-th-replace="~{fragment/layout :: frag_layout(content= ~{::main})}" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<main>



    <div class="relative z-10 ">
        <div class="ms-15 p-2">
            <h2 class="text-[5rem] font-medium text-white">Add Category </h2>
            <h2 class="text-[3rem] font-light text-white">Admin interface</h2>
        </div>
        <section class="flex items-center justify-center w-full ">
            <div class="flex w-full gap-10 p-2 justify-center">
                <form class="w-3/4 items-center" th:action="@{createCat}" method="POST" th:object="${category}">

                    <div class="flex gap-10">
                        <div class="mt-15 flex h-12 w-full items-center gap-2 overflow-hidden rounded-full border border-gray-200 bg-white pl-5 focus-within:border-gray-300 ">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                 xmlns="http://www.w3.org/2000/svg" stroke="#000000">
                                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                                <g id="SVGRepo_iconCarrier">
                                    <circle cx="9" cy="9" r="2" stroke="#000000" stroke-width="1.5"></circle>
                                    <path d="M13 15C13 16.1046 13 17 9 17C5 17 5 16.1046 5 15C5 13.8954 6.79086 13 9 13C11.2091 13 13 13.8954 13 15Z"
                                          stroke="#000000" stroke-width="1.5"></path>
                                    <path d="M2 12C2 8.22876 2 6.34315 3.17157 5.17157C4.34315 4 6.22876 4 10 4H14C17.7712 4 19.6569 4 20.8284 5.17157C22 6.34315 22 8.22876 22 12C22 15.7712 22 17.6569 20.8284 18.8284C19.6569 20 17.7712 20 14 20H10C6.22876 20 4.34315 20 3.17157 18.8284C2 17.6569 2 15.7712 2 12Z"
                                          stroke="#000000" stroke-width="1.5"></path>
                                    <path d="M19 12H15" stroke="#000000" stroke-width="1.5"
                                          stroke-linecap="round"></path>
                                    <path d="M19 9H14" stroke="#000000" stroke-width="1.5"
                                          stroke-linecap="round"></path>
                                    <path d="M19 15H16" stroke="#000000" stroke-width="1.5"
                                          stroke-linecap="round"></path>
                                </g>
                            </svg>
                            <label for="idName"></label>
                            <input
                                    placeholder="First Name"
                                    class="h-full  bg-white text-sm placeholder-black  text-black outline-none w-1/2"
                                    required=""
                                    type="text"
                                    id="idName"
                                    name="name"
                                    th:field="*{name}"
                            />


                        </div>
                    </div>
                    <div class="flex gap-10">

                        <button type="submit"
                                class="mt-8 mb-8 h-7 w-full cursor-pointer rounded-full bg-linear-to-b bg-white text-black transition hover:from-gray-200 hover:to-gray-400">
                            Login
                        </button>

                    </div>

                </form>

            </div>
        </section>
    </div>







</main>
</body>
</html>
